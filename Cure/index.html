            optionsHtml += `<button class="option-btn ${isSelected ? 'selected' : ''}" data-opt-index="${idx}">${opt}</button>`;
        });

        const progressPercent = ((currentQuestionIndex + 1) / 40) * 100;

                <div class="progress-bar"><div class="progress-fill" style="width: ${progressPercent}%"></div></div>

                </div>
            </div>

                <button class="nav-btn" id="prevBtn" ${currentQuestionIndex === 0 ? 'disabled' : ''}>← 上一题</button>
                <button class="nav-btn" id="nextBtn">${currentQuestionIndex === 39 ? '完成测评' : '下一题 →'}</button>
            </div>
        `;

        // 绑定选项事件
        document.querySelectorAll('.option-btn').forEach(btn => {

                const idx = parseInt(btn.dataset.optIndex);
                userAnswers[currentQuestionIndex] = idx;
                renderQuestion(); // 重新渲染以更新选中状态
            });
        });

        // 绑定导航事件

            if (currentQuestionIndex > 0) {

                renderQuestion();

                alert('✨ 请先选择一个选项，再继续下一题～');
                return;
            }
            if (currentQuestionIndex === 39) {
                finishQuiz();
            } else {
                currentQuestionIndex++;
                renderQuestion();
            }
        });
    }

    function finishQuiz() {
        // 计算总分
        const questions = questionsData[currentMode];
        let totalScore = 0;
        for (let i = 0; i < 40; i++) {
            const answer = userAnswers[i];
            if (answer !== null) {
                totalScore += questions[i].scores[answer];
            }
        }
        
        // 获取等级解读
        const levels = resultLevels[currentMode];
        let levelInfo = levels[levels.length - 1];
        for (let i = 0; i < levels.length; i++) {
            if (totalScore <= levels[i].max) {
                levelInfo = levels[i];
                break;
            }
        }
        
        // 生成个性化建议
        const personalAdvice = generatePersonalAdvice(userAnswers, currentMode);
        
        // 渲染结果页面
        quizContent.innerHTML = `
            <div class="result-area">
                <div class="result-score">你的总分：${totalScore} / 120</div>
                <div class="result-level">${levelInfo.level}</div>
                <div class="result-message">${levelInfo.message}</div>

                <button class="restart-btn" id="restartBtn">重新测评</button>
            </div>
        `;
        document.getElementById('restartBtn')?.addEventListener('click', () => {
            resetQuiz();
        });
        quizFinished = true;
    }

    function resetQuiz() {
        currentQuestionIndex = 0;
        userAnswers = new Array(40).fill(null);
        quizFinished = false;
        startQuiz();
    }

    function startQuiz() {
        quizStarted = true;
        quizFinished = false;
        renderQuestion();
    }

    function changeMode(mode) {
        currentMode = mode;
        currentQuestionIndex = 0;
        userAnswers = new Array(40).fill(null);
        quizStarted = false;
        quizFinished = false;
        startQuiz();
    }

    // 模式切换事件
    modeBtns.forEach(btn => {
        btn.addEventListener('click', () => {
            modeBtns.forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            const mode = btn.dataset.mode;
            changeMode(mode);
        });
    });

    // 暗色模式
    const themeToggle = document.getElementById('themeToggle');
    let darkMode = localStorage.getItem('darkMode') === 'true';
    if (darkMode) {
        document.body.classList.add('dark');
        themeToggle.innerHTML = '<i class="fas fa-sun"></i>';
    }
    themeToggle.addEventListener('click', () => {
        darkMode = !darkMode;
        if (darkMode) {
            document.body.classList.add('dark');
            themeToggle.innerHTML = '<i class="fas fa-sun"></i>';
        } else {
            document.body.classList.remove('dark');
            themeToggle.innerHTML = '<i class="fas fa-moon"></i>';
        }
        localStorage.setItem('darkMode', darkMode);
    });

    startQuiz();
